<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#f4f7f4" />
    <title>聯華交通_液位換算</title>
    <link rel="manifest" href="manifest.webmanifest?v=28" />
    <link rel="stylesheet" href="styles.css?v=28" />
  </head>
  <body>
    <main class="sheet-app">
      <header class="sheet-topbar">
        <h1>聯華交通_液位換算</h1>
        <div class="top-actions">
          <button class="small-action" id="undoAction" type="button" aria-label="復原" title="復原">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 14 4 9l5-5" />
              <path d="M4 9h10a6 6 0 1 1 0 12h-3" />
            </svg>
          </button>
          <button class="small-action" id="settingsAction" type="button" aria-label="設定" title="設定">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
              <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 1 1 4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1A2 2 0 1 1 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3h.1a1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 1 1 19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9v.1a1.7 1.7 0 0 0 1.6 1h.1a2 2 0 1 1 0 4H21a1.7 1.7 0 0 0-1.6 1Z" />
            </svg>
          </button>
          <button class="small-action danger" id="resetAll" type="button" aria-label="清空" title="清空">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18" />
              <path d="M8 6V4h8v2" />
              <path d="M6 6l1 15h10l1-15" />
              <path d="M10 11v6" />
              <path d="M14 11v6" />
            </svg>
          </button>
        </div>
      </header>

      <section class="table-wrap" aria-label="液位換算表">
        <div class="calc-grid" id="calcGrid"></div>
      </section>

      <section class="summary-panel" id="summaryPanel" aria-label="總淨重與剩餘"></section>
    </main>

    <section class="settings-panel" id="settingsPanel" aria-label="設定" hidden>
      <div class="settings-card">
        <div class="settings-head">
          <div>
            <p>設定</p>
            <h2>換算係數</h2>
          </div>
          <button class="icon-action" id="closeSettings" type="button" aria-label="關閉設定">×</button>
        </div>
        <label class="toggle-row">
          <span>
            <strong>鎖定 1cm=kg</strong>
            <small>鎖定時新人只能輸入液位，避免誤改係數。</small>
          </span>
          <input id="factorLockToggle" type="checkbox" />
        </label>
        <button class="restore-factor" id="restoreFactors" type="button">還原預設係數 36 / 31 / 33 / 25 / 21 / 37.5</button>
      </div>
    </section>

    <section class="keypad" aria-label="數字鍵盤">
      <div class="keypad-grid" id="keypadGrid"></div>
    </section>

    <script src="app.js?v=28"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          registrations.forEach((registration) => registration.unregister());
        });
      }
      if ("caches" in window) {
        caches.keys().then((keys) => keys.forEach((key) => caches.delete(key)));
      }
    </script>
  </body>
</html>
