<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f7f4" />
    <title>液位換算表</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="sheet-app">
      <header class="sheet-topbar">
        <div>
          <p>聯華交通</p>
          <h1>液位換算表</h1>
        </div>
        <div class="top-actions">
          <button class="small-action" id="undoAction" type="button">復原</button>
          <button class="small-action danger" id="resetAll" type="button">清空</button>
        </div>
      </header>

      <section class="table-wrap" aria-label="液位換算表">
        <div class="calc-grid" id="calcGrid"></div>
      </section>

      <section class="summary-panel" id="summaryPanel" aria-label="總淨重與剩餘"></section>
    </main>

    <section class="keypad" aria-label="數字鍵盤">
      <div class="active-cell" id="activeCellLabel">點選表格儲存格</div>
      <div class="keypad-grid" id="keypadGrid"></div>
    </section>

    <script src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./service-worker.js");
      }
    </script>
  </body>
</html>
